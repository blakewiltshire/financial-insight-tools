  company_overview: 'Airbnb, Inc. primarily operates a global platform for stays and experiences. The Company’s marketplace
    model connects hosts and guests online or through mobile devices to book spaces and experiences around the world. It partners
    with hosts throughout the process of setting up their listing and provide them with a range of tools to manage their listings,
    including scheduling, merchandising, integrated payments, community support, host protections, pricing guidance, and feedback
    from reviews. Its Website and mobile applications provide its guests a way to explore a variety of homes and experiences
    and an easy way to book them. Its hosts generally fall into two categories: individual and professional. Individual hosts
    list their spaces, including private rooms, primary homes, or vacation homes, on Airbnb. Professional hosts are often
    those who run property management or hospitality businesses and generally use application programming interfaces to list
    their properties on its platform.'
